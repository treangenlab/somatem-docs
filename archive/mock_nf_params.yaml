# Nextflow Pipeline Parameters
# This file contains configuration options for a dummy workflow (somatem)
# generated by AI to test omi-web-app

# ======================
# Input/Output Settings
# ======================
input:
  # Sequencing data inputs
  reads: "data/experiment1/*.fastq.gz"  # Input reads (supports glob patterns)
  sample_sheet: ""      # Optional sample metadata
  
  # Reference databases
  databases:
    host_genome: "path/to/host/genome.fa"  # For host read filtering
    centrifuge_db: "path/to/centrifuge/db"
    emu_db: "path/to/emu/database"
    seqscreen_db: "path/to/seqscreen/db"
    
output:
  dir: "results/experiment1"           # Base output directory
  reports: "${output.dir}/reports"      # Directory for reports
  processed: "${output.dir}/processed"  # Processed data
  
# ======================
# Pipeline Configuration
# ======================
pipeline:
  # Pipeline modes
  mode: "metagenomic"  # Options: 16s, metagenomic, assembly
  
  # Data type
  data_type: "nanopore"  # Options: nanopore, pacbio, illumina
  
  # Analysis modules to run
  modules:
    quality_control: true
    assembly: false
    binning: false
    taxonomic_profiling: true
    functional_annotation: true
    pangenomics: false
    snp_sv_detection: false
    metabolic_reconstruction: false
  
# ======================
# Quality Control
# ======================
quality_control:
  # Initial QC
  nanoplot:
    enabled: true
    options: "--loglength --N50 --title 'NanoPlot Analysis'"
    
  # Host read filtering
  hostile:
    enabled: true
    min_identity: 0.95
    min_coverage: 0.9
    
  # Read filtering and trimming
  chopper:
    enabled: true
    min_quality: 7
    min_length: 1000
    headcrop: 50
    
  filtlong:
    enabled: true
    min_length: 1000
    target_bases: 5000000000
    keep_percent: 90
    
  # General QC options
  fastqc:
    enabled: true
    options: "--threads 4 --kmers 7"
    
  multiqc:
    enabled: true
    options: "-f --interactive"

# ======================
# Assembly
# ======================
assembly:
  # Reference-guided assembly
  metacompass:
    enabled: true
    mode: "quick"  # quick, sensitive, or very-sensitive
    min_contig_length: 1000
    
  # De novo assembly
  flye:
    enabled: true
    genome_size: "5m"  # Expected genome size (e.g., 5m, 100k)
    read_type: "nano"  # nano, pacbio, pacbio-raw, pacbio-corr, pacbio-hifi
    
  autocycler:
    enabled: true
    min_overlap: 1000
    min_identity: 95

# ======================
# Binning
# ======================
binning:
  # Contig-based binning
  metabat2:
    enabled: true
    min_contig_length: 1500
    max_p: 95
    min_s: 60
    
  # Assembly graph-based binning
  vamb:
    enabled: true
    min_contig_length: 1500
    num_epochs: 500

# ======================
# Taxonomic Profiling
# ======================
taxonomic_profiling:
  # 16S profiling
  emu:
    enabled: true
    db: "${input.databases.emu_db}"
    min_abundance: 0.01
    
  # Long-read metagenomic profiling
  lemur:
    enabled: true
    min_abundance: 0.1
    kmer_size: 21
    
  # Metagenomic classification
  sylph:
    enabled: true
    kmer_size: 21
    min_abundance: 0.1
    
  # Rapid metagenomic classification
  centrifuge:
    enabled: true
    db: "${input.databases.centrifuge_db}"
    min_hit_length: 21
    min_confidence: 0.0
    
  # MAG-based refinement
  magnet:
    enabled: true
    min_contig_length: 1000
    min_aln_identity: 90

# ======================
# Pangenomics
# ======================
pangenomics:
  # Core genome alignment
  parsnp:
    enabled: true
    min_conserved: 2
    min_region_length: 100
    
  # Maximal homologous group identification
  tmhg_finder:
    enabled: true
    min_group_size: 2
    min_identity: 0.9

# ======================
# SNP and SV Detection
# ======================
snp_sv_detection:
  # Structural variant detection
  rhea:
    enabled: true
    min_sv_size: 10
    min_read_support: 3
    min_mapq: 20

# ======================
# Functional Annotation
# ======================
functional_annotation:
  # Pathogen screening
  seqscreen:
    enabled: true
    db: "${input.databases.seqscreen_db}"
    min_confidence: 0.9
    
  # Orthology-based annotation
  eggnog_mapper:
    enabled: true
    db: "eggnog"  # eggnog, bact, arch, euk
    dmnd_db: ""  # Path to custom DIAMOND database
    
  # Metabolic profiling
  humann:
    enabled: true
    protein_database: "uniref90"  # uniref50, uniref90, or custom
  
  # Diversity analysis
  diversity:
    rarefaction_depth: 10000
    metrics:
      alpha: ["shannon", "observed_features", "faith_pd"]
      beta: ["braycurtis", "unweighted_unifrac", "weighted_unifrac"]
    pcoa_components: 3
    heatmap_top_n: 50

# ======================
# Metabolic Reconstruction
# ======================
metabolic_reconstruction:
  # Metabolic modeling
  bakdrive:
    enabled: true
    min_abundance: 0.1
    
  # Microbial community modeling
  micom:
    enabled: true
    solver: "cplex"  # cplex, gurobi, or cplex
    
  # SNP and differential abundance
  differential:
    method: "ancom"  # Options: ancom, deseq2, lefse, maaslin2
    group_column: ""  # Column in metadata to group by
    reference_group: ""  # Reference group for comparisons
    alpha: 0.05  # Significance threshold

# ======================
# Visualization and Reporting
# ======================
visualization:
  # Assembly graph visualization
  metagenomescope:
    enabled: true
    min_contig_length: 1000
    
  # Interactive reports
  report:
    interactive: true
    format: "html"  # Options: html, pdf, both
    include:
      quality_metrics: true
      assembly_stats: true
      taxonomic_profiles: true
      functional_annotation: true
      diversity_analysis: true
      differential_abundance: true

# ======================
# Resource Allocation
# ======================
resources:
  # Global resource limits
  max_cpus: 64
  max_memory: "512 GB"
  max_time: "720h"  # 30 days
  
  # Process-specific overrides
  process_resources:
    # Default resources
    "*":
      cpus: 1
      memory: "8 GB"
      time: "1h"
    
    # Assembly processes
    "assembly:flye":
      cpus: 32
      memory: "256 GB"
      time: "168h"  # 7 days
      
    # Binning processes
    "binning:vamb":
      cpus: 16
      memory: "128 GB"
      time: "72h"
      
    # Taxonomic profiling
    "taxonomic_profiling:centrifuge":
      cpus: 16
      memory: "64 GB"
      time: "24h"
      
    # Functional annotation
    "functional_annotation:humann":
      cpus: 16
      memory: "64 GB"
      time: "48h"
      
    # Pangenomics
    "pangenomics:parsnp":
      cpus: 8
      memory: "32 GB"
      time: "24h"

# ======================
# Execution Control
# ======================
execution:
  # Execution options
  resume: true           # Resume from last successful step
  max_retries: 3         # Number of times to retry failed steps
  error_strategy: "retry" # retry, ignore, terminate
  
  # Container configuration
  container:
    enabled: true
    engine: "singularity"  # singularity or docker
    auto_pull: true
    
  # Email notifications
  email:
    enabled: false
    to: ""
    from: ""
    smtp: "smtp.example.com"
    
  # Nextflow configuration
  nextflow:
    work_dir: "${launchDir}/work"
    cache_dir: "${launchDir}/.nextflow"
    report: "${output.dir}/reports/execution_report.html"
    timeline: "${output.dir}/reports/execution_timeline.html"
    dag: "${output.dir}/reports/pipeline_dag.html"
    
  # Cluster/Cloud execution
  executor: "local"  # local, slurm, awsbatch, etc.
  
  # AWS Batch configuration (if using AWS)
  aws:
    region: ""
    queue: ""
    job_role: ""
    
  # SLURM configuration (if using SLURM)
  slurm:
    account: ""
    partition: ""
    qos: ""
  email_on_fail: false