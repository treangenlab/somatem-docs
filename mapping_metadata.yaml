# Mapping Metadata Documentation
# This file documents the metadata fields and their implications for the SOMAteM pipeline

# Data Types
# ----------
# Describes the type of input data being analyzed
data_type:
  - name: "16S"
    definition: |
      16S amplicon sequencing data from a microbial community. This is the most common
      type of data for profiling microbial communities in a cost-effective manner.
    details: |
      16S ribosomal RNA-based analysis is the established standard for elucidating the
      composition of microbial communities. While short-read 16S rRNA analyses are
      largely confined to genus-level resolution at best, given that only a portion of
      the gene is sequenced, full-length 16S rRNA gene amplicon sequences have the
      potential to provide species-level accuracy. However, existing taxonomic
      identification algorithms are not optimized for the increased read length and
      error rate often observed in long-read data.
      
      Source: Emu/abstract: https://www.nature.com/articles/s41592-022-01520-4
    analysis_type:
      - name: taxonomic-profiling
        tools: Emu
        notes:
          - "Taxonomic profiling can yield genus or higher level taxonomic mapping of each read (rarely species level) and relative abundance."
          - "Caveat: PCR amplification used in 16S sequencing distorts read ratios from true microbial community composition (PCR bias)."

  - name: isolate
    definition: |
      Genomic DNA sequencing reads generated from a single microbial isolate.
      Whole-genome sequencing of microbial isolates provides valuable information for
      public health, clinical microbiology research, food safety, and the biopharma sector.
    analysis_type:
      - name: assembly
        description: "Can assemble a complete genome using the reads"
      - name: taxonomic-profiling
        description: | 
          Profiling doesn't make sense when you a single isolate. But you can verify 
          the species/strain of the isolate you sequenced. Just be aware of false positives."
      

  - name: metagenomic
    definition: |
      Genomic DNA sequencing reads generated from a microbial community.
      Generates higher resolution (species or strain level) taxonomic mapping of each
      read compared to 16S.
    analysis_type: [taxonomic-profiling, pathogen, assembly, genome-dynamics]

# Analysis Types
# --------------
# Describes the type of analysis to be performed
analysis_type:
  - name: taxonomic-profiling
    definition: |
      Profiling the taxonomic composition (species match and relative abundance)
      of a microbial community sample.
    description: |
      Taxonomic profiling is the process of identifying the taxonomic identity
      (genus, species, strain) of each read in a metagenomic sample (16S, shotgun)
      and computing the relative abundance of each taxon in the sample.

  - name: assembly
    definition: |
      Assemble the reads into contiguous sequences (contigs) to reconstruct
      complete or partial genomes.
    description: |
      Assembly is the process of reconstructing the genome of a microbial isolate
      or metagenome assembled genomes (MAGs) from genomic DNA sequence reads. Output includes
      annotated genome/contigs (.fasta format) and visualization (e.g., circos plots).

  - name: pathogen
    definition: |
      Detect and characterize potential pathogens in the sample using functional
      profiling of known virulence factors.
    description: |
      Pathogen detection identifies the presence of pathogens in a metagenomic
      sample (16S, shotgun) by analyzing virulence genes and functional sequences
      associated with known pathogens.

  - name: genome-dynamics
    definition: |
      Analyze genomic variation across multiple samples (time-series or cross-section).
    description: |
      Examines genomic changes over time or between conditions, including single
      nucleotide variants (SNVs) and structural variants (SVs).
    tools: Rhea
    notes: |
      Specialized tool for genomic variation analysis from time-series samples.
      Can identify both structural variants (SVs) and single nucleotide variants (SNVs).

# Sample Status
# --------------
# Describes the sampling strategy and temporal relationship between samples
sample_status:
  - name: cross-section
    definition: |
      One or more samples of microbial communities that are not time-series.
    description: |
      Cross-sectional sampling captures a snapshot of the microbial community
      at a single point in time, or multiple samples collected without
      temporal relationships.
    is_default: true

  - name: longitudinal
    definition: |
      A time series of multiple samples from the same microbial community.
    description: |
      Longitudinal sampling involves collecting multiple samples from the same
      community over time, enabling analysis of temporal dynamics and changes
      in the microbial composition or genomic features.
    analysis_type:
      - name: genome-dynamics
        tools: Rhea
        notes: |
          Specialized tool for analyzing genomic variation in time-series data,
          capable of identifying structural variants (SVs) and single nucleotide
          variants (SNVs) across samples.

# sequencing technology used to generate the reads
sequencing_technology: 
  - name: nanopore
    definition: Oxford Nanopore Technologies (ONT) sequencing platforms.
    description: |
      For R10 data, use --nano-hq. Expected error rate is <3%.
      
      For R9 data basecalled with Guppy5+, use --nano-hq --read-error 0.05. 
      The expected error rate is <5%.
      
      For older ONT data (e.g., R7-older R9 chemistry) use --nano-raw. 
      The expected error rate is 10-15%.
      
      For error-corrected ONT reads (with methods such as Canu), use --nano-corr.
      
    sequencing_technology_qualifiers: 
      - R10: 
        - "Expected error rate is <3%"
        - "Will use --nano-hq for flye assembly"
      - R9: 
        - "Expected error rate is <5%"
        - "Will use --nano-hq --read-error 0.05 for flye assembly"
      - older: 
        - "Expected error rate is 10-15%"
        - "Will use --nano-raw for flye assembly"
      
  - name: pacbio
    definition: Pacific Biosciences (PacBio) sequencing platforms.
    description: |
      For regular PacBio CLR data, use --pacbio-raw. Works for a wide range of 
      datasets (P5C3/P6C4/Sequel) with error rate 13-15%.
      
      Note: In CLR mode, Flye assumes that the input files represent PacBio 
      subreads (adaptors and scraps removed, multiple passes separated). 
      
      For PacBio HiFi data, use --pacbio-hifi mode. The default error-rate is 0.001 
      (in HPC space), and works well for default CCS algorithm settings 
      (e.g., 3+ polymerase passes). Error can be adjusted via --read-error.
      
    sequencing_technology_qualifiers: 
      - CLR: 
        - "Expected error rate is 13-15%"
        - "Will use --pacbio-raw for flye assembly"
      - HiFi: 
        - "Expected error rate is 0.001%"
        - "Will use --pacbio-hifi for flye assembly"

# Running Mode
# ------------
# Determines the computational environment and available analysis options
running_mode:
  - name: laptop
    definition: |
      Optimized for execution on a laptop or personal computer with limited
      computational resources.
    description: |
      This mode is designed for quick analyses with lower computational
      requirements, focusing on essential functionality.
    analysis_type:
      - name: taxonomic-profiling
        confidence_level: regular
        notes: "Basic taxonomic profiling using reads"
    is_default: true

  - name: cluster
    definition: |
      Designed for high-performance computing (HPC) environments or workstations
      with substantial computational resources.
    description: |
      Enables all analysis types, including resource-intensive processes like
      genome assembly and comprehensive variant analysis.
    analysis_type: [taxonomic-profiling, pathogen, assembly, genome-dynamics]

# Confidence Level
# ----------------
# Determines the depth and thoroughness of the analysis
confidence_level:
  - name: high
    definition: |
      Uses both assembled contigs and raw reads to generate the most accurate
      possible profile.
    description: |
      This approach combines the strengths of both assembly-based and read-based
      analyses. By generating contigs through assembly and then mapping reads
      back to these contigs, it can resolve ambiguities and improve accuracy,
      especially in complex microbial communities.
    analysis_workflow:
      - analysis_type: assembly
        description: "Assemble reads into contigs"
      - analysis_type: [taxonomic-profiling, pathogen]
        description: "Generate taxonomic/functional profiles using both contigs and reads separately"
        notes: "Uses both assembled contigs and raw reads to generate the most accurate possible profile."

  - name: regular
    definition: |
      Uses only raw reads for analysis, providing faster results with
      potentially lower accuracy.
    description: |
      This approach skips the assembly step and directly analyzes the raw
      sequencing reads. While faster and less computationally intensive, it may
      miss some genomic context that could improve accuracy, particularly in
      regions with repetitive sequences or closely related organisms.
    analysis_type: [taxonomic-profiling, pathogen]
        notes: "Direct analysis of raw sequencing reads"
    is_default: true


